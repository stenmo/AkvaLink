esphome:
  name: akvalink
  friendly_name: AkvaLink Pool Thermometer
  name_add_mac_suffix: true
  project:
    name: stenmo.akvalink
    version: "0.3.1"

dashboard_import:
  package_import_url: github://stenmo/AkvaLink/esphome/akvalink.yaml@main
  import_full_config: false

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    # pioarduino 55.03.39 (IDF 5.5.4) for coex_background_scan support.
    # Toolchain esp-14.2.0_20260121 from pioarduino registry is broken;
    # packages/toolchain-riscv32-esp/ is pre-populated with the working
    # esp-14.2.0_20251107 binaries so idf_tools.py fails non-fatally and
    # the working toolchain is used for compilation.
    version: "5.5.4"
    platform_version: https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip

# Serial logging (USB CDC on GPIO19/20 by default on C6)
logger:

# Home Assistant native API
api:
  encryption:
    key: !secret api_encryption_key

# OTA updates
ota:
  - platform: esphome
    password: !secret ota_password

# Wi-Fi — credentials from secrets.yaml or adopted dashboard
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback AP when Wi-Fi is not provisioned yet
  ap:
    ssid: AkvaLink-Setup

captive_portal:

# Improv over USB serial (works right after flashing via ESP Web Tools)
improv_serial:

# 1-Wire bus on GPIO15 (J15.4 on EVK-NORA-W40, 4.7 kΩ pull-up to +3V3)
one_wire:
  - platform: gpio
    pin: GPIO15
    id: ow_bus

sensor:
  - platform: dallas_temp
    name: "Pool Temperature"
    one_wire_id: ow_bus
    update_interval: 60s
    accuracy_decimals: 1
    filters:
      - filter_out: nan
      - delta: 0.25
