name: akvalink
description: "AkvaLink — battery-powered Matter pool & aquatic temperature sensor companion (iOS, Android, Windows, Linux, macOS)."
publish_to: 'none'

# Kept in lock-step with the firmware version (../version.txt).
version: 0.3.1+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Cross-platform BLE (iOS, Android, Windows, Linux, macOS) — the same library
  # the u-connectXplorer app uses, proven across every target platform.
  universal_ble: ^1.2.0
  provider: ^6.1.5
  shared_preferences: ^2.5.4
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
