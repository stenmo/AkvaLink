## IDF Component Manager manifest.
##
## NOTE: We deliberately do NOT depend on `espressif/esp_matter` here.
## The Component Manager fetch of esp-matter breaks because of nested
## connectedhomeip submodule paths (see /memories/repo/esp-idf-build-quirks.md
## and /memories/repo/wsl-esp-matter-workflow.md).
##
## Instead, we use the build-time env var `EXTRA_COMPONENT_DIRS` pointing at
## `${ESP_MATTER_PATH}/components`, set up by build.sh from the manually
## cloned ~/esp/esp-matter checkout. This is Espressif's officially supported
## workflow for any non-trivial esp-matter project.
##
## The remaining managed deps (onewire_bus, ds18b20) are small, well-formed
## Component Registry entries and work fine.

idf_component_manifest_schema: 1.0.0

dependencies:
  idf:
    version: ">=5.4.1"

  # 1-Wire bus driver (RMT-based, RISC-V friendly).
  espressif/onewire_bus:
    version: "^1.0.2"

  # DS18B20 driver built on top of onewire_bus.
  espressif/ds18b20:
    version: "^0.1.1"
