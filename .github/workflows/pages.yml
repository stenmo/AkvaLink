name: Deploy landing page to GitHub Pages

# Publishes the static site in web/ to GitHub Pages.
# The site is self-contained (no build step) — we just upload web/ as-is.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  # Re-deploy when a release is published so web/firmware/ tracks the newest
  # firmware for the page's one-click 'flash latest' over BLE.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Same-origin firmware for one-click BLE OTA: the browser can't fetch
      # GitHub release assets directly (CORS), so stage the latest BLE app image
      # under web/firmware/ where the page can fetch it same-origin. Best-effort:
      # if no app image is published yet, the page falls back to file-pick.
      - name: Stage latest BLE app image for one-click OTA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web/firmware
          asset=$(gh release view --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name | select(startswith("akvalink-ble-app-")) | select(endswith(".bin"))' \
            2>/dev/null | head -n1 || true)
          if [ -n "$asset" ]; then
            gh release download --repo "$GITHUB_REPOSITORY" --pattern "$asset" \
              --output web/firmware/akvalink-ble-app.bin --clobber
            echo "Staged $asset -> web/firmware/akvalink-ble-app.bin"
          else
            echo "No akvalink-ble-app-*.bin in the latest release yet — the page"
            echo "will fall back to manual file-pick until one is published."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
